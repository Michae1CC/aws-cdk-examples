user www-data;
worker_processes auto;
pid /run/nginx.pid;

include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	# Default directory where all website files are located
	root /tmp/www;

	# Enable zero-copy file transfers.
	sendfile on;
	# Used in conjunction with sendfile so that HTTP response headers
	# are sent in one packet right after the chunk of data has been
	# obtained by sendfile.
	tcp_nopush on;
	# The tcp_nodelay directive allows override of Nagle's algorithm,
	# originally designed to solve problems with small packets in slow
	# networks. Nowadays, when serving large static files, the data can
	# be immediately sent regardless of the packet size.
	tcp_nodelay on;

	# Sets the maximum size of the internal hash tables used to store
	# and quickly look up MIME types.
	types_hash_max_size 2048;
	# Sets the memory bucket size for Nginx's MIME types hash table.
	types_hash_bucket_size 128;

	# The maximum number of requests that can be served through one
	# keep-alive connection. After the maximum number of requests are
	# made, the connection is lost.
	keepalive_requests 1000;
	# Sets a timeout during which a keep-alive client connection will
	# stay open on the server side. The second value sets the value in
	# the Keep-Alive header.
	keepalive_timeout 75s 75s;

	include /etc/nginx/mime.types;
	
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	# Create a json log format. This will make it easier to search
	# for logs when they are injested into Cloudwatch
	log_format json_log escape=json '{'
	'"time": "$time_iso8601", '
	'"remote_addr": "$remote_addr", '
	'"request": "$request", '
	'"status": "$status" '
	'}';

	access_log /var/log/nginx/access_json.log json_log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;

	server {
		location / {
			# Tries to server the request as a file, then a directory,
			# and falls back to 404 error if neither exist.
			try_files $uri $uri/ $uri.html =404;
			# Configure NGINX to return an automatically generated directory
			# listing instead serving an index file.
			autoindex on;
		}
	}
}

